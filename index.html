<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <title>Hot51 Live</title>

    <style>
        body {
            margin: 0;
            background: black;
            font-family: sans-serif;
            overflow: hidden;
        }

        #app {
            max-width: 100%;
            height: 100vh;
            margin: auto;
            position: relative;
            overflow: hidden;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .9), transparent);
        }


        /* TOP */

        .top {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            z-index: 5;
        }

        .profile {
            display: flex;
            gap: 8px;
        }

        .avatarBox {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid gold;
        }

        .follow {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: blue;
            color: white;
            font-size: 14px;

            display: flex;
            align-items: center;
            justify-content: center;

            position: absolute;
            top: 0;
            right: 0;

            border: 2px solid white;
        }

        #name {
            color: black;
        }

        .viewer {
            background: rgba(0, 0, 0, 0.253);
            padding: 5px 12px;
            height: 20px;
            border-radius: 50px;
            height: 30px;
        }

        .vip {
            color: cyan;
            font-size: 12px;
        }

        /* COIN */

        .coin {
            position: absolute;
            top: 90px;
            left: 10px;
            background: rgba(0, 0, 0, 0.253);
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
        }


        /* CHAT */

        #chat {
            position: absolute;
            bottom: 60px;
            left: 10px;
            z-index: 5;
        }

        .chat {
            background: rgba(0, 0, 0, 0.253);
            color: white;
            padding: 5px 10px;
            margin-bottom: 4px;
            border-radius: 5px;
            font-size: 13px;
        }

        .male {
            color: yellow;
            font-weight: bold;
        }

        /* LIKE */

        .like {
            position: absolute;
            right: 20px;
            bottom: 80px;
            font-size: 22px;
            animation: up 2s forwards;
        }

        @keyframes up {
            0% {
                opacity: 1;
                transform: translateY(0)
            }

            100% {
                opacity: 0;
                transform: translateY(-300px)
            }
        }


        /* GIFT */

        .gift {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 160px;
            font-size: 60px;
            animation: pop 2s forwards;
        }

        @keyframes pop {
            0% {
                opacity: 0;
                scale: .4
            }

            50% {
                opacity: 1;
                scale: 1.6
            }

            100% {
                opacity: 0
            }
        }


        /* SPARKLE */

        .spark {
            position: absolute;
            color: gold;
            font-size: 20px;
            animation: spark 1s linear forwards;
        }

        @keyframes spark {
            0% {
                opacity: 1
            }

            100% {
                opacity: 0;
                transform: translateY(-80px)
            }
        }


        /* JOIN */

        .join {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 1, 1, 0.315);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 13px;
        }


        /* BOTTOM */

        .bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 8px;
            padding: 10px;
        }

        .chatBtn {
            flex: 1;
            background: rgba(0, 0, 0, 0.253);
            color: white;
        }

        .coinBtn {
            width: 40px;
            background: blue
        }

        .giftBtn {
            width: 40px;
            background: gold;
        }

        .likeBtn {
            width: 40px;
            background: pink;
        }

        .nextBtn {
            width: 40px;
            background: orangered;
        }

        .btn {
            height: 40px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
    </style>

</head>

<body>

    <div id="app">

        <video id="video" autoplay muted loop></video>

        <div class="overlay"></div>

        <div class="top">

            <div class="profile">

                <div class="avatarBox">
                    <img class="avatar">
                    <div class="follow">+</div>
                </div>
                <div>
                    <div id="name">Live</div>
                    <div id="id">ID</div>
                    <div class="vip">VIP HOST 👑</div>
                </div>

            </div>

            <div id="viewer" class="viewer">0</div>

        </div>


        <div id="coin" class="coin">💰 0</div>

        <div id="chat"></div>

        <div class="bottom">
            <div class="btn chatBtn">💬 To chat with...</div>
            <div class="btn coinBtn">💰</div>
            <div class="btn giftBtn" onclick="gift()">🎁</div>
            <div class="btn likeBtn" onclick="like()">❤️</div>
            <div class="btn nextBtn" onclick="next()">⏬</div>
        </div>

    </div>

    <script>
        // Base URL otomatis mengikuti domain saat ini
        const baseURL = window.location.origin + "/live/user/";

        // Daftar gambar
        const photos = [
            baseURL + "img1.jpg",
            baseURL + "img2.jpg",
            baseURL + "img3.jpg",
            baseURL + "img4.jpg",
            baseURL + "img5.jpg",
            baseURL + "img6.jpg",
            baseURL + "img7.jpg",
            baseURL + "img8.jpg",
            baseURL + "img9.jpg",
            baseURL + "img10.jpg",
            baseURL + "img11.jpg",
            baseURL + "img12.jpg",
            baseURL + "img13.jpg",
            baseURL + "img14.jpg",
            baseURL + "img15.jpg"
        ];

        const videos = [
            "https://ik.imagekit.io/aducsmuph/video_2026-02-09_14-16-32.mp4",
            "https://ik.imagekit.io/aducsmuph/video_2026-01-17_18-13-19.mp4",
            "https://ik.imagekit.io/aducsmuph/video_2026-01-20_02-52-41.mp4"
        ]


        const female = [
            "SalsaHot", "NadiaViral", "PutriLive",
            "AyuCute", "LunaHot", "RaraViral",
            "MayaCantik", "VinaLive", "DewiHot"
        ]


        const male = [
            "Budi", "Rizky", "Agus", "Fajar", "Rian",
            "Dimas", "Yoga", "Andre", "Kevin", "Reza",
            "Hendra", "Ardi", "Fikri", "Rafi", "Ilham"
        ]


        const messages = [
            "🔥🔥🔥",
            "host sultan",
            "💎 gift",
            "VIP hadir",
            "cantik parah",
            "auto koin",
            "gass",
            "rame banget",
            "stay live"
        ]

        const joinText = [

            "joined",
            "VIP joined",
            "Sultan joined",
            "send gift",
            "enter room",
            "follow host",
            "like live",
            "support host",
            "share live",
            "top fan joined",
            "VIP masuk",
            "sultan hadir",
            "auto gift",
            "diamond gift"

        ]

        const gifts = ["🎁", "💎", "🚗", "👑", "💰", "🎉", "🌹", "🚀"]


        const video = document.getElementById("video")
        const nameEl = document.getElementById("name")
        const idEl = document.getElementById("id")
        const chat = document.getElementById("chat")
        const viewer = document.getElementById("viewer")
        const coinEl = document.getElementById("coin")
        const app = document.getElementById("app")

        let coin = 0
        let view = 0


        function next() {

            video.src =
                videos[Math.floor(Math.random() * videos.length)]

            video.play()

            nameEl.innerText =
                female[Math.floor(Math.random() * female.length)]

            idEl.innerText =
                "ID " + Math.floor(1000000 + Math.random() * 9000000)

            document.querySelector(".avatar").src =
                photos[Math.floor(Math.random() * photos.length)]

            view = 1 + Math.floor(Math.random() * 99)

            viewer.innerText = "👁 " + view + "K"

            chat.innerHTML = ""

            popup("VIP entering...")

        }



        function addChat(t) {

            let d = document.createElement("div")
            d.className = "chat"

            let name = t.split(":")[0]
            let msg = t.split(":")[1]

            d.innerHTML =
                "<span class='male'>" + name + "</span>:" + msg

            chat.appendChild(d)

            if (chat.children.length > 8)
                chat.removeChild(chat.children[0])
        }



        function popup(t) {

            let j = document.createElement("div")
            j.className = "join"
            j.innerText = t

            document.body.appendChild(j)

            setTimeout(() => j.remove(), 1500)

        }



        function like() {

            let l = document.createElement("div")
            l.className = "like"
            l.innerText = "❤️"

            document.body.appendChild(l)

            setTimeout(() => l.remove(), 2000)

        }

        setInterval(like, 500)



        function gift() {

            let g = document.createElement("div")
            g.className = "gift"

            let gft =
                gifts[Math.floor(Math.random() * gifts.length)]

            g.innerText = gft

            document.body.appendChild(g)

            coin += 100

            coinEl.innerText = "💰 " + coin

            spark()

            setTimeout(() => g.remove(), 2000)

        }

        setInterval(() => {

            if (Math.random() < 0.7) gift()

        }, 1500)



        function spark() {

            let s = document.createElement("div")

            s.className = "spark"

            s.innerText = "✨"

            s.style.left =
                Math.random() * 300 + "px"

            s.style.top =
                Math.random() * 400 + "px"

            document.body.appendChild(s)

            setTimeout(() => s.remove(), 1000)

        }



        setInterval(() => {

            let user =
                male[Math.floor(Math.random() * male.length)]

            let msg =
                messages[Math.floor(Math.random() * messages.length)]

            addChat(user + ": " + msg)

        }, 1000)



        setInterval(() => {

            let user =
                male[Math.floor(Math.random() * male.length)]

            let txt =
                joinText[Math.floor(Math.random() * joinText.length)]

            if (Math.random() < 0.3) {

                popup("👑 " + user + " " + txt)

            } else {

                popup(user + " " + txt)

            }

        }, 1500)



        let startY = 0

        app.addEventListener("touchstart", e => {
            startY = e.touches[0].clientY
        })

        app.addEventListener("touchend", e => {

            let endY = e.changedTouches[0].clientY

            if (startY - endY > 50) next()

        })


        next()
    </script>

</body>

</html>
